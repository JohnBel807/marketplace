<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1c1917"/>
  
  <!-- Gradient overlay -->
  <rect width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1c1917;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo V -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="#ea580c"/>
  <text x="116" y="136" font-family="Georgia,serif" font-size="48" font-weight="700" fill="white" text-anchor="middle">V</text>

  <!-- Brand name -->
  <text x="172" y="118" font-family="Georgia,serif" font-size="36" font-weight="700" fill="white">VelezYRicaurte</text>
  <text x="172" y="148" font-family="Arial,sans-serif" font-size="18" fill="#a8a29e">.info — Marketplace Regional</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="Georgia,serif" font-size="72" font-weight="700" fill="white">El mercado local</text>
  <text x="80" y="360" font-family="Georgia,serif" font-size="72" font-weight="700" fill="#ea580c">de tu región</text>

  <!-- Description -->
  <text x="80" y="430" font-family="Arial,sans-serif" font-size="26" fill="#a8a29e">Vehículos · Maquinaria · Ganado · Empleos · Servicios</text>
  <text x="80" y="468" font-family="Arial,sans-serif" font-size="26" fill="#a8a29e">Provincia de Vélez, Santander, Colombia</text>

  <!-- Divider -->
  <line x1="80" y1="510" x2="400" y2="510" stroke="#ea580c" stroke-width="3"/>

  <!-- Footer -->
  <text x="80" y="550" font-family="Arial,sans-serif" font-size="20" fill="#78716c">www.velezyricaurte.info</text>

  <!-- Decorative circles -->
  <circle cx="1050" cy="315" r="200" fill="#ea580c" opacity="0.08"/>
  <circle cx="1050" cy="315" r="140" fill="#ea580c" opacity="0.08"/>
  <circle cx="1050" cy="315" r="80" fill="#ea580c" opacity="0.15"/>

  <!-- Category icons (text-based) -->
  <text x="950" y="260" font-family="Arial,sans-serif" font-size="48" fill="#ea580c" opacity="0.6" text-anchor="middle">🚗</text>
  <text x="1050" y="300" font-family="Arial,sans-serif" font-size="48" fill="#ea580c" opacity="0.6" text-anchor="middle">🚜</text>
  <text x="1150" y="260" font-family="Arial,sans-serif" font-size="48" fill="#ea580c" opacity="0.6" text-anchor="middle">🐄</text>
  <text x="1000" y="370" font-family="Arial,sans-serif" font-size="48" fill="#ea580c" opacity="0.6" text-anchor="middle">💼</text>
  <text x="1100" y="370" font-family="Arial,sans-serif" font-size="48" fill="#ea580c" opacity="0.6" text-anchor="middle">🔧</text>
</svg>
